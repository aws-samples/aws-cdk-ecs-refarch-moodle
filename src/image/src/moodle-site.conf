<VirtualHost *:8080>
    ServerAdmin admin@localhost
    DocumentRoot /var/www/moodle/public

    <Directory /var/www/moodle/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /r.php
                
        # Enable slasharguments (as per Moodle documentation)
        AcceptPathInfo On
        
        # Hiding internal paths (as per Moodle documentation)
        RewriteEngine On

        RewriteRule "(\/vendor\/)" - [F]
        RewriteRule "(\/node_modules\/)" - [F]
        RewriteRule "(^|/)\.(?!well-known\/)" - [F]
        RewriteRule "(composer\.json)" - [F]
        RewriteRule "(\.lock)" - [F]
        RewriteRule "(\/environment.xml)" - [F]
        Options -Indexes
        RewriteRule "(\/install.xml)" - [F]
        RewriteRule "(\/README)" - [F]
        RewriteRule "(\/readme)" - [F]
        RewriteRule "(\/moodle_readme)" - [F]
        RewriteRule "(\/upgrade\.txt)" - [F]
        RewriteRule "(\/UPGRADING\.md)" - [F]
        RewriteRule "(phpunit\.xml\.dist)" - [F]
        RewriteRule "(\/tests\/behat\/)" - [F]
        RewriteRule "(\/fixtures\/)" - [F]
        RewriteRule "(\/upgrade\.txt|UPGRADING\.md|UPGRADING\-CURRENT\.md)" - [F]       
    </Directory>

    # Deny access to internal Moodle files (as per Moodle documentation)
    <DirectoryMatch "^/var/www/moodle/(?!public/)">
        Require all denied
    </DirectoryMatch>

    # Handling 40x errors (as per Moodle documentation)
    ErrorDocument 404 /error/index.php
    # This sends any 403 from apache through to the same page, but also
    # overrides the http status with 404 instead for better security.
    ErrorDocument 403 /error/index.php?code=404

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # PHP settings recommended by Moodle
    <IfModule mod_php.c>
        php_value upload_max_filesize 100M
        php_value post_max_size 100M
        php_value max_execution_time 300
        php_value max_input_time 300
        php_value memory_limit 256M
    </IfModule>

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
</VirtualHost>