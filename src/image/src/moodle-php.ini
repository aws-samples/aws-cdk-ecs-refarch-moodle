; Moodle recommended PHP settings
; Based on https://docs.moodle.org/501/en/PHP

; File uploads
upload_max_filesize = 100M
post_max_size = 100M
max_input_vars = 5000

; Execution limits
max_execution_time = 300
max_input_time = 300
memory_limit = 256M

; Error handling
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Session settings
session.save_handler = files
session.auto_start = 0
session.cookie_httponly = 1

; Other settings
file_uploads = On
allow_url_fopen = On
